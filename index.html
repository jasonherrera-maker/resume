<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jason Herrera — Senior Legal Operations & Program Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #1c1917;
    --ink-soft:  #44403c;
    --ink-muted: #78716c;
    --paper:     #faf9f7;
    --cream:     #f5f0e8;
    --rule:      #e7e2d9;
    --gold:      #92784a;
    --gold-lt:   #c9b07a;
    --gold-bg:   #f7f3ec;
    --cat1: #eef2ff; --cat1d: #4f46e5;
    --cat2: #ecfdf5; --cat2d: #059669;
    --cat3: #fff7ed; --cat3d: #c2620a;
    --cat4: #eff6ff; --cat4d: #2563eb;
    --cat5: #fdf2f8; --cat5d: #a21caf;
    --cat6: #f0fdf4; --cat6d: #16a34a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── LOADER ── */
  #loader {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.5s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-inner { text-align: center; }
  .loader-ring {
    width: 40px; height: 40px;
    border: 2px solid var(--rule);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  .loader-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--ink-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LAYOUT ── */
  #app { opacity: 0; transition: opacity 0.6s ease; }
  #app.visible { opacity: 1; }

  .page-wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  /* header bleeds to viewport edges */
  header {
    margin-left: -32px;
    margin-right: -32px;
  }

  @media (max-width: 640px) {
    .page-wrap { padding: 0 16px 60px; }
    header { margin-left: -16px; margin-right: -16px; padding: 36px 16px 32px; }
    .projects-grid { grid-template-columns: 1fr; }
    .modal { padding: 24px 20px; }
  }

  /* ── HEADER ── */
  header {
    background: #1a1714;
    padding: 52px 32px 44px;
    margin-left: calc(-32px);
    margin-right: calc(-32px);
    margin-bottom: 0;
  }

  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
  }

  .name-block h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.6rem, 5.5vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.03em;
    line-height: 1;
    color: #f5f0e8;
  }

  .name-block h1 .first-name {
    color: #f5f0e8;
    font-weight: 300;
  }

  .name-block h1 .last-name {
    color: var(--gold-lt);
    font-weight: 400;
    font-style: italic;
  }

  .taglines {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    margin-top: 12px;
    align-items: center;
  }

  .tagline-item {
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #a89468;
  }

  .tagline-sep {
    color: #4a4540;
    margin: 0 10px;
    font-size: 0.7rem;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #2e2a26;
    align-items: center;
  }

  .contact-item {
    font-size: 0.78rem;
    color: #c8bfa8; /* cream — for location & phone */
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .contact-item.contact-link {
    color: var(--gold-lt); /* gold — for email & LinkedIn */
  }
  .contact-item:hover { color: #fff; }
  .contact-icon { font-size: 0.75rem; opacity: 0.6; }

  /* ── NAV TABS ── */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 40px;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 100;
    box-shadow: 0 1px 0 var(--rule);
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    padding: 16px 22px 14px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── SECTION PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── EXPERIENCE ── */
  .employer-block {
    border-left: 2px solid var(--rule);
    padding-left: 28px;
    margin-bottom: 44px;
    position: relative;
  }

  .employer-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 24px;
    cursor: pointer;
    border: 1px solid var(--rule);
    border-left: 3px solid var(--rule);
    background: white;
    transition: border-left-color 0.2s, background 0.15s;
    user-select: none;
  }
  .employer-header:hover { border-left-color: var(--gold-lt); background: var(--gold-bg); }
  .employer-block.open .employer-header {
    border-left-color: var(--gold);
    background: var(--gold-bg);
    border-bottom: 1px solid var(--rule);
  }

  .employer-header-left { flex: 1; }

  .employer-toggle {
    font-size: 0.75rem;
    color: var(--ink-muted);
    transition: transform 0.25s;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .employer-block.open .employer-toggle { transform: rotate(180deg); color: var(--gold); }

  .employer-body {
    display: none;
    padding: 20px 24px 24px;
    border: 1px solid var(--rule);
    border-top: none;
    border-left: 3px solid var(--gold);
    background: white;
    animation: fadeUp 0.2s ease;
  }
  .employer-block.open .employer-body { display: block; }

  .employer-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .employer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
  }

  .employer-dates {
    font-size: 0.72rem;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .employer-industry {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    padding: 2px 8px;
    background: var(--gold-bg);
    border-radius: 3px;
  }

  .position-list { margin-bottom: 14px; }
  .position-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--rule);
  }
  .position-item:last-child { border-bottom: none; }
  .position-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold-lt);
    margin-top: 6px;
    flex-shrink: 0;
  }
  .position-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink);
  }
  .position-focus {
    font-size: 0.78rem;
    color: var(--ink-muted);
    margin-top: 1px;
  }
  .position-team {
    font-size: 0.72rem;
    color: var(--ink-muted);
    font-style: italic;
  }

  .key-legacy {
    margin-top: 4px;
    padding: 12px 16px;
    background: var(--cream);
    border-left: 3px solid var(--gold-lt);
    font-size: 0.82rem;
    color: var(--ink-soft);
    line-height: 1.65;
    font-style: italic;
  }

  /* ── PROJECTS ── */
  .projects-filter {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
    justify-content: space-between;
  }
  .projects-filter-left {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .projects-filter-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .filter-sep {
    width: 1px;
    height: 20px;
    background: var(--rule);
    margin: 0 4px;
  }

  /* project card highlight/dim */
  .project-card { transition: opacity 0.25s, box-shadow 0.2s, border-left 0.2s; }
  .project-card.dimmed { opacity: 0.22; }
  .project-card.highlighted { border-left: 3px solid var(--gold) !important; background: var(--gold-bg) !important; }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: white;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--gold-lt); color: var(--gold); }
  .filter-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .project-card {
    background: white;
    border: 1px solid var(--rule);
    border-top: 3px solid var(--gold-lt);
    padding: 20px 22px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s, border-top-color 0.2s;
  }
  .project-card:hover {
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    transform: translateY(-2px);
    border-top-color: var(--gold);
  }

  .project-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }

  .project-type-badge {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .project-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.35;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .project-summary {
    font-size: 0.8rem;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 12px;
  }

  .project-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }

  .meta-chip {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--cream);
    color: var(--ink-soft);
    font-weight: 500;
  }

  .expand-hint {
    font-size: 0.7rem;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  /* Project Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(28,25,23,0.55);
    backdrop-filter: blur(3px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--paper);
    max-width: 680px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 36px 40px;
    position: relative;
    transform: translateY(16px);
    transition: transform 0.25s;
    border-top: 4px solid var(--gold);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none; border: none;
    font-size: 1.4rem;
    color: var(--ink-muted);
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .modal-close:hover { color: var(--ink); }

  .modal-badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .modal-section { margin-bottom: 20px; }
  .modal-section-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .modal-section-body {
    font-size: 0.875rem;
    color: var(--ink-soft);
    line-height: 1.65;
  }

  .modal-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .modal-chip {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 3px;
    background: var(--cream);
    color: var(--ink-soft);
    font-weight: 400;
  }

  /* ── SKILLS ── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .skill-category-block {
    background: white;
    border: 1px solid var(--rule);
    padding: 22px 24px 26px;
  }

  .skill-cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  .skill-cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .skill-cat-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink);
  }

  .skill-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .skill-item:last-child { border-bottom: none; padding-bottom: 0; }

  .skill-name {
    font-size: 0.82rem;
    color: var(--ink-soft);
    font-weight: 500;
    line-height: 1.3;
  }
  .skill-summary-text {
    font-size: 0.72rem;
    color: var(--ink-muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  /* ── TECHNOLOGIES ── */
  .tech-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .tech-category-block {
    background: white;
    border: 1px solid var(--rule);
    padding: 22px 24px 26px;
  }

  .tech-cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  .tech-cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tech-cat-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink);
  }

  .tech-tags { display: flex; flex-wrap: wrap; gap: 7px; }

  .tech-tag {
    font-size: 0.75rem;
    font-weight: 400;
    padding: 5px 11px;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    transition: all 0.15s;
    cursor: pointer;
  }
  .tech-tag:hover { border-color: var(--gold-lt); color: var(--gold); background: var(--gold-bg); }

  /* ── COLLABORATIONS ── */
  .collab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .collab-card {
    background: white;
    border: 1px solid var(--rule);
    padding: 18px 20px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: box-shadow 0.2s;
  }
  .collab-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

  .collab-type-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .collab-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .collab-rep {
    font-size: 0.76rem;
    color: var(--ink-muted);
    line-height: 1.45;
    font-style: italic;
  }

  .collab-where {
    font-size: 0.68rem;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 0.06em;
    margin-top: 5px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  /* Employment History heading — larger, matches original prototype */
  .experience-heading {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }
  .experience-heading h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .experience-heading-hint {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    font-weight: 400;
  }

  /* ── COLLAB ACCORDION ── */
  .collab-group { margin-bottom: 28px; }

  .collab-group-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    background: white;
    border: 1px solid var(--rule);
    border-left: 3px solid var(--rule);
    cursor: pointer;
    user-select: none;
    transition: border-left-color 0.2s, background 0.15s;
    margin-bottom: 0;
  }
  .collab-group-header:hover { border-left-color: var(--gold-lt); background: var(--gold-bg); }
  .collab-group.open .collab-group-header {
    border-left-color: var(--gold);
    border-bottom: 1px solid var(--rule);
  }

  .collab-group-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--ink);
    flex: 1;
  }
  .collab-group-count {
    font-size: 0.72rem;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
  }
  .collab-group-toggle {
    font-size: 0.8rem;
    color: var(--ink-muted);
    transition: transform 0.25s;
  }
  .collab-group.open .collab-group-toggle { transform: rotate(180deg); color: var(--gold); }

  .collab-group-body {
    display: none;
    border: 1px solid var(--rule);
    border-top: none;
    border-left: 3px solid var(--gold-lt);
    padding: 16px;
  }
  .collab-group.open .collab-group-body { display: block; animation: fadeUp 0.2s ease; }

  /* Environment filter pills */
  .collab-env-filter {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .env-pill {
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: white;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .env-pill:hover { border-color: var(--gold-lt); color: var(--gold); }
  .env-pill.active { background: var(--ink); color: white; border-color: var(--ink); }

  /* highlight / dim on env filter */
  .collab-card { transition: opacity 0.25s, box-shadow 0.2s, border-left 0.25s; }
  .collab-card.dimmed { opacity: 0.22; }
  .collab-card.highlighted { border-left: 3px solid var(--gold) !important; background: var(--gold-bg) !important; }


  /* ── CATEGORY COLORS ── */
  .c-sys   { background: var(--cat1); color: var(--cat1d); }
  .c-proc  { background: var(--cat2); color: var(--cat2d); }

<script>
// ── HELPERS ──────────────────────────────────────────────
// All Airtable calls go through /api/airtable — token never touches the browser
async function fetchAll(table) {
  let records = [], offset = null;
  do {
    const url = `/api/airtable?table=${encodeURIComponent(table)}${offset ? '&offset=' + offset : ''}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(`${table}: ${data.error}`);
    records.push(...data.records);
    offset = data.offset || null;
  } while (offset);
  return records;
}

function f(rec, field) {
  return (rec.fields && rec.fields[field]) || '';
}

function catClass(cat) {
  const map = {
    'Systems & Technology':           'sys',
    'Process Design & Operations':    'proc',
    'Program & Compliance Management':'prog',
    'Legal Practice & Execution':     'legal',
    'Trial & Hearing Support':        'trial',
    'Leadership & Development':       'lead',
    // Tech categories
    'AI & Emerging Tech':             'sys',
    'Legal Research & Compliance':    'legal',
    'Litigation & Matter Management': 'trial',
    'Productivity & Collaboration':   'proc',
    'Data & Knowledge Management':    'prog',
  };
  return map[cat] || 'prog';
}

function formatDate(d) {
  if (!d) return 'Present';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

// ── RENDER HEADER ────────────────────────────────────────
function renderHeader(recs) {
  if (!recs.length) return;
  const r = recs[0];

  // Split name → first (light) / last (italic gold)
  const fullName = f(r,'Name') || 'Jason Herrera';
  const parts    = fullName.trim().split(' ');
  const firstName = parts[0];
  const lastName  = parts.slice(1).join(' ');
  document.getElementById('hdr-first').textContent = firstName;
  document.getElementById('hdr-last').textContent  = lastName;

  // Taglines from Airtable Title1/2/3
  const t1 = f(r,'Title1') || f(r,'Title 1'), t2 = f(r,'Title2') || f(r,'Title 2'), t3 = f(r,'Title3') || f(r,'Title 3');
  if (t1 || t2 || t3) {
    const tl = document.getElementById('hdr-taglines');
    tl.innerHTML = '';
    [t1,t2,t3].filter(Boolean).forEach((t,i,arr) => {
      const sp = document.createElement('span');
      sp.className = 'tagline-item'; sp.textContent = t;
      tl.appendChild(sp);
      if (i < arr.length-1) {
        const sep = document.createElement('span');
        sep.className = 'tagline-sep'; sep.textContent = '|';
        tl.appendChild(sep);
      }
    });
  }

  // Contact row — inline left-to-right
  const contact = document.getElementById('hdr-contact');
  const items = [
    { val: f(r,'Location'),     icon: '📍', href: null,                                    link: false },
    { val: f(r,'Phone Number'), icon: '☎',  href: `tel:${f(r,'Phone Number')}`,            link: false },
    { val: f(r,'Email'),        icon: '✉',  href: `mailto:${f(r,'Email')}`,                link: true  },
    { val: f(r,'URL1') ? 'linkedin.com/in/jason-u-herrera' : '', icon: '↗', href: f(r,'URL1'), link: true },
  ];
  items.filter(i => i.val).forEach(item => {
    const a = document.createElement(item.href ? 'a' : 'span');
    a.className = 'contact-item' + (item.link ? ' contact-link' : '');
    if (item.href) {
      a.href = item.href;
      if (item.href.startsWith('http')) a.target = '_blank';
    }
    a.innerHTML = `<span class="contact-icon">${item.icon}</span>${item.val}`;
    contact.appendChild(a);
  });
}

// ── RENDER EXPERIENCE ────────────────────────────────────
function renderExperience(employers, positions) {
  const posMap = {};
  positions.forEach(p => {
    const empLinks = p.fields.Employer || [];
    empLinks.forEach(eid => {
      if (!posMap[eid]) posMap[eid] = [];
      posMap[eid].push(p);
    });
  });

  const sorted = [...employers].sort((a,b) => {
    const da = f(a,'Start Date') ? new Date(f(a,'Start Date')) : new Date(0);
    const db = f(b,'Start Date') ? new Date(f(b,'Start Date')) : new Date(0);
    return db - da;
  });

  const panel = document.getElementById('experience');
  panel.innerHTML = `
    <div class="experience-heading">
      <h2>Professional History</h2>
      <span class="experience-heading-hint">Click any employer to expand</span>
    </div>
  `;

  sorted.forEach((emp, idx) => {
    const block = document.createElement('div');
    block.className = 'employer-block' + (idx === 0 ? ' open' : '');
    block.style.marginBottom = '12px';

    const sd = formatDate(f(emp,'Start Date'));
    const ed = formatDate(f(emp,'End Date'));
    const industry = f(emp,'Industry');

    // ── HEADER (clickable toggle) ──
    const hdr = document.createElement('div');
    hdr.className = 'employer-header';
    hdr.innerHTML = `
      <div class="employer-header-left">
        <div class="employer-meta">
          <div class="employer-name">${f(emp,'Employer')}</div>
          <div class="employer-dates">${sd} – ${ed}</div>
          ${industry ? `<div class="employer-industry">${industry}</div>` : ''}
        </div>
      </div>
      <button class="emp-page-btn" title="Open full employer page">⊞</button>
      <div class="employer-toggle">▾</div>
    `;
    // Wire page button separately with stopPropagation
    hdr.querySelector('.emp-page-btn').addEventListener('click', e => {
      e.stopPropagation();
      openEmployerDrawer(emp);
    });
    hdr.addEventListener('click', () => {
      block.classList.toggle('open');
    });
    block.appendChild(hdr);

    // ── BODY (collapsible) ──
    const body = document.createElement('div');
    body.className = 'employer-body';

    const posList = posMap[emp.id] || [];
    if (posList.length) {
      const pl = document.createElement('div');
      pl.className = 'position-list';
      posList.forEach(pos => {
        const pi = document.createElement('div');
        pi.className = 'position-item';
        pi.innerHTML = `
          <div class="position-dot"></div>
          <div>
            <div class="position-name">${f(pos,'Position')}</div>
            ${f(pos,'Focus')  ? `<div class="position-focus">${f(pos,'Focus')}</div>` : ''}
            ${f(pos,'Team')   ? `<div class="position-team">${f(pos,'Team')}</div>` : ''}
          </div>
        `;
        pl.appendChild(pi);
      });
      body.appendChild(pl);
    }

    if (f(emp,'Key Legacy')) {
      const kl = document.createElement('div');
      kl.className = 'key-legacy';
      kl.textContent = f(emp,'Key Legacy');
      body.appendChild(kl);
    }

    block.appendChild(body);
    panel.appendChild(block);
  });
}

// ── RENDER PROJECTS ──────────────────────────────────────
function renderProjects(projects) {
  const panel = document.getElementById('projects');
  panel.innerHTML = '';

  // Collect unique Practice Areas for filter pills
  const areas = [...new Set(projects.map(p => f(p,'Practice Area')).filter(Boolean))].sort();

  const filterRow = document.createElement('div');
  filterRow.className = 'projects-filter';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'All';
  allBtn.dataset.filter = '';
  filterRow.appendChild(allBtn);

  areas.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = a;
    btn.dataset.filter = a;
    filterRow.appendChild(btn);
  });
  panel.appendChild(filterRow);

  const grid = document.createElement('div');
  grid.className = 'projects-grid';
  grid.id = 'projects-grid';
  panel.appendChild(grid);

  filterRow.addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    filterRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderProjectCards(allProjects, e.target.dataset.filter);
  });

  renderProjectCards(projects, '');
}

function renderProjectCards(projects, paFilter) {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '';
  const filtered = (paFilter
    ? projects.filter(p => f(p,'Practice Area') === paFilter)
    : projects).slice().sort((a,b) => (f(a,'Practice Area')||'').localeCompare(f(b,'Practice Area')||'') || (f(a,'Project')||'').localeCompare(f(b,'Project')||''));

  filtered.forEach(proj => {
    const card = document.createElement('div');
    card.className = 'project-card';

    const hdr = document.createElement('div');
    hdr.className = 'project-card-header';

    const pa = document.createElement('div');
    pa.className = 'meta-chip';
    pa.textContent = f(proj,'Practice Area') || '';
    hdr.appendChild(pa);

    card.appendChild(hdr);

    const title = document.createElement('div');
    title.className = 'project-title';
    const raw = f(proj,'Project');
    title.textContent = raw.length > 90 ? raw.slice(0,87)+'…' : raw;
    card.appendChild(title);

    const hint = document.createElement('div');
    hint.className = 'expand-hint';
    hint.textContent = '↗ View details';
    card.appendChild(hint);

    card.addEventListener('click', () => openProjectModal(proj));
    grid.appendChild(card);
  });
}

function openProjectModal(proj) {
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');

  // ── Badge row: Practice Area + Employer chips ──
  const paVal    = f(proj,'Practice Area');
  const empLinks = proj.fields['Employers'] || proj.fields['Employer'] || [];
  let empChipsHtml = '';
  if (empLinks.length && allEmployers.length) {
    empChipsHtml = empLinks.map(eid => {
      const emp = allEmployers.find(e => e.id === eid);
      if (!emp) return '';
      const name = f(emp,'Employer') || f(emp,'Name') || '';
      return `<button class="project-type-badge emp-modal-chip" data-emp-id="${eid}" style="background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-lt);cursor:pointer">${name}</button>`;
    }).join('');
  }

  const badges = `
    <div class="modal-badge-row">
      ${paVal ? `<span class="project-type-badge" style="background:var(--cream);color:var(--ink-soft)">${paVal}</span>` : ''}
      ${empChipsHtml}
    </div>
  `;

  // ── Narrative sections ──
  const sections = [
    { label: 'Problem',          val: f(proj,'Problem Statement') },
    { label: 'Execution',        val: f(proj,'Execution Path') },
    { label: 'Outcome & Impact', val: f(proj,'Outcome / Impact') },
  ].filter(s => s.val);

  // ── Skills — High Level (Project Type field) ──
  const ptVal = f(proj,'Project Type');
  let skillsHighLevelHtml = '';
  if (ptVal) {
    const cc2 = catClass(ptVal);
    skillsHighLevelHtml = `
      <div class="modal-section">
        <div class="modal-section-label">Skills — High Level</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px">
          <span class="project-type-badge c-${cc2}">${ptVal}</span>
        </div>
      </div>`;
  }

  // ── Skills — Granular (linked Skill Sets) ──
  const skillLinks = proj.fields['Skill Sets'] || [];
  let skillChipsHtml = '';
  if (skillLinks.length && allSkills.length) {
    const chips = skillLinks.map(sid => {
      const sk = allSkills.find(s => s.id === sid);
      if (!sk) return '';
      const scat   = f(sk,'Skill Type');
      const bgVar  = `var(--cat${catIndex(scat)})`;
      const fgVar  = `var(--cat${catIndex(scat)}d)`;
      return `<button class="skill-chip-link" data-skill-id="${sid}" style="background:${bgVar};color:${fgVar}"><span class="sc-dot" style="background:${fgVar}"></span>${f(sk,'Skill')}</button>`;
    }).join('');
    if (chips) {
      skillChipsHtml = `
        <div class="modal-section">
          <div class="modal-section-label">Skills — Granular</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px">${chips}</div>
        </div>`;
    }
  }

  // ── Technologies (linked Technologies field) ──
  const techLinks = proj.fields['Technologies'] || [];
  let techChipsHtml = '';
  if (techLinks.length && allTechnologies.length) {
    const chips = techLinks.map(tid => {
      const tech = allTechnologies.find(t => t.id === tid);
      if (!tech) return '';
      const name = f(tech,'Technology') || f(tech,'Tech (Name)') || f(tech,'Name') || '';
      return `<button class="project-type-badge modal-tech-chip" data-tech-id="${tid}" style="background:var(--cream);color:var(--ink-soft);border:1px solid var(--rule);cursor:pointer">${name}</button>`;
    }).join('');
    if (chips) {
      techChipsHtml = `
        <div class="modal-section">
          <div class="modal-section-label">Technologies</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px">${chips}</div>
        </div>`;
    }
  }

  content.innerHTML = `
    ${badges}
    <div class="modal-title">${f(proj,'Project')}</div>
    ${sections.map(s => `
      <div class="modal-section">
        <div class="modal-section-label">${s.label}</div>
        <div class="modal-section-body">${s.val}</div>
      </div>
    `).join('')}
    ${skillsHighLevelHtml}
    ${skillChipsHtml}
    ${techChipsHtml}
  `;

  // Wire tech chip clicks → tech drill-down (slides up from bottom)
  content.querySelectorAll('.modal-tech-chip').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const tech = allTechnologies.find(t => t.id === btn.dataset.techId);
      if (tech) openTechDrillDown(tech);
    });
  });

  // Wire employer chip clicks → employer drawer
  content.querySelectorAll('.emp-modal-chip').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const emp = allEmployers.find(em => em.id === btn.dataset.empId);
      if (emp) {
        document.getElementById('modal-overlay').classList.remove('open');
        setTimeout(() => openEmployerDrawer(emp), 180);
      }
    });
  });

  // Wire skill chip clicks → skill drill-down
  content.querySelectorAll('.skill-chip-link').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const sk = allSkills.find(s => s.id === btn.dataset.skillId);
      if (sk) openSkillDrillDown(sk);
    });
  });

  overlay.classList.add('open');
}

// ── SKILL DRILL-DOWN ─────────────────────────────────────
let allSkills       = [];
let allProjects     = [];
let allEmployers    = [];
let allTechnologies = [];
let allPositions    = [];
let allCollabs      = [];

// ── Navigation stack — tracks what was open under tech drill-down ──
// Values: 'modal' | 'drawer' | null
let navStack = [];

function catIndex(cat) {
  const map = {
    'Systems & Technology': 1,
    'Process Design & Operations': 2,
    'Program & Compliance Management': 3,
    'Legal Practice & Execution': 4,
    'Trial & Hearing Support': 5,
    'Leadership & Development': 6,
    'AI & Emerging Tech': 1,
    'Legal Research & Compliance': 4,
    'Litigation & Matter Management': 5,
    'Productivity & Collaboration': 2,
    'Data & Knowledge Management': 3,
  };
  return map[cat] || 3;
}

function openSkillDrillDown(skill) {
  const overlay = document.getElementById('skill-drill-overlay');
  const hdrEl   = document.getElementById('sdp-header-content');
  const bodyEl  = document.getElementById('sdp-body');

  const scat = f(skill,'Skill Type');
  const ci   = catIndex(scat);
  const cc   = catClass(scat);

  // ── Header ──
  const proficiency = f(skill,'Skill Proficiency');
  const tier        = f(skill,'Strategic Tier');
  hdrEl.innerHTML = `
    <div class="sdp-skill-badge c-${cc}">
      <span class="sdp-dot dot-${cc}"></span>${scat}
    </div>
    <div class="sdp-skill-name">${f(skill,'Skill')}</div>
    ${f(skill,'Skill Summary') ? `<div class="sdp-skill-summary">${f(skill,'Skill Summary')}</div>` : ''}
    <div class="sdp-meta-row">
      ${proficiency ? `<div class="sdp-meta-item">Proficiency <strong>${proficiency}</strong></div>` : ''}
      ${tier ? `<div class="sdp-meta-item">Tier <strong>${tier}</strong></div>` : ''}
    </div>
  `;

  // ── Body: linked projects ──
  bodyEl.innerHTML = '';
  const linkedProjIds = skill.fields['Projects'] || [];
  const linkedProjs   = allProjects.filter(p => linkedProjIds.includes(p.id));

  if (linkedProjs.length) {
    const sec = document.createElement('div');
    sec.className = 'sdp-section';
    sec.innerHTML = `<div class="sdp-section-label">Projects (${linkedProjs.length})</div>`;

    linkedProjs.forEach(proj => {
      const pt  = f(proj,'Project Type');
      const pcc = catClass(pt);
      const row = document.createElement('div');
      row.className = 'sdp-project-row';
      const title = f(proj,'Project');
      const setting = f(proj,'Setting');
      row.innerHTML = `
        <div class="sdp-proj-title">${title}</div>
        <div class="sdp-proj-meta">
          ${pt ? `<span class="sdp-proj-chip c-${pcc}">${pt}</span>` : ''}
          ${setting ? `<span class="sdp-proj-chip" style="background:var(--cream);color:var(--ink-muted)">${setting}</span>` : ''}
        </div>
      `;
      // Click a project row → close drill-down, open project modal
      row.addEventListener('click', () => {
        closeSkillDrillDown();
        setTimeout(() => openProjectModal(proj), 180);
      });
      sec.appendChild(row);
    });
    bodyEl.appendChild(sec);
  }

  // ── Body: linked employers (via projects → Employers linked field) ──
  const empIdSet = new Set();
  linkedProjs.forEach(p => {
    (p.fields['Employers'] || p.fields['Employer'] || []).forEach(id => empIdSet.add(id));
  });
  const linkedEmps = allEmployers.filter(e => empIdSet.has(e.id));

  if (linkedEmps.length) {
    const sec2 = document.createElement('div');
    sec2.className = 'sdp-section';
    sec2.innerHTML = `<div class="sdp-section-label">Deployed At</div>`;
    linkedEmps.forEach(emp => {
      const row = document.createElement('div');
      row.className = 'sdp-employer-row';
      row.style.cursor = 'pointer';
      row.textContent = f(emp,'Employer');
      row.addEventListener('click', () => {
        closeSkillDrillDown();
        setTimeout(() => openEmployerDrawer(emp), 180);
      });
      sec2.appendChild(row);
    });
    bodyEl.appendChild(sec2);
  }

  overlay.classList.add('open');
  document.getElementById('skill-drill-overlay').querySelector('.skill-drill-panel') &&
    (document.getElementById('skill-drill-overlay').querySelector('.skill-drill-panel').scrollTop = 0);
}

function closeSkillDrillDown() {
  document.getElementById('skill-drill-overlay').classList.remove('open');
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('sdp-close').addEventListener('click', closeSkillDrillDown);
document.getElementById('skill-drill-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSkillDrillDown();
});
// ESC closes both panels
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeSkillDrillDown();
    document.getElementById('modal-overlay').classList.remove('open');
  }
});

// ── RENDER SKILLS ─────────────────────────────────────────
function renderSkills(skills) {
  const panel = document.getElementById('skills');
  panel.innerHTML = '<div class="section-title">Core Competencies</div>';

  const catOrder = [
    'Systems & Technology',
    'Process Design & Operations',
    'Program & Compliance Management',
    'Legal Practice & Execution',
    'Trial & Hearing Support',
    'Leadership & Development',
  ];

  const grouped = {};
  skills.forEach(s => {
    const cat = f(s,'Skill Type') || 'Other';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(s);
  });
  // Sort each category alphabetically by skill name
  Object.keys(grouped).forEach(cat => {
    grouped[cat].sort((a,b) => (f(a,'Skill')||'').localeCompare(f(b,'Skill')||''));
  });

  const grid = document.createElement('div');
  grid.className = 'skills-grid';

  const cats = catOrder.filter(c => grouped[c]).concat(
    Object.keys(grouped).filter(c => !catOrder.includes(c))
  );

  cats.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'skill-category-block';
    const cc = catClass(cat);

    block.innerHTML = `
      <div class="skill-cat-header">
        <div class="skill-cat-dot dot-${cc}"></div>
        <div class="skill-cat-name">${cat}</div>
      </div>
    `;

    grouped[cat].forEach(s => {
      const item = document.createElement('div');
      item.className = 'skill-item';
      item.innerHTML = `
        <div style="flex:1">
          <div class="skill-name">${f(s,'Skill')}</div>
          ${f(s,'Skill Summary') ? `<div class="skill-summary-text">${f(s,'Skill Summary')}</div>` : ''}
        </div>
        <div class="skill-item-arrow">↗</div>
      `;
      item.style.display = 'flex';
      item.style.alignItems = 'flex-start';
      item.style.justifyContent = 'space-between';
      item.style.cursor = 'pointer';
      item.addEventListener('click', () => openSkillDrillDown(s));
      block.appendChild(item);
    });

    grid.appendChild(block);
  });

  panel.appendChild(grid);
}

// ── RENDER TECHNOLOGIES ──────────────────────────────────
function renderTechnologies(techs) {
  const panel = document.getElementById('technologies');
  panel.innerHTML = '<div class="section-title">Technical Proficiencies</div>';

  const catOrder = [
    'AI & Emerging Tech',
    'Litigation — Law Firm',
    'Matter Management & Insights',
    'Legal Research & Compliance',
    'Data & Knowledge Management',
    'Productivity & Collaboration',
  ];

  // Remap categories from Airtable values to display categories
  function remapTechCat(techName, originalCat) {
    const lawFirmTools = ['Concordance','TrialDirector','CaseMap','iPRO','LiveNote'];
    if (originalCat === 'Litigation & Matter Management' || originalCat === 'Matter Management & Reporting') {
      if (lawFirmTools.some(t => techName.includes(t))) return 'Litigation — Law Firm';
      return 'Matter Management & Insights';
    }
    if (techName === 'Smartsheet') return 'Data & Knowledge Management';
    if (techName === 'Asana') return 'Productivity & Collaboration';
    if (originalCat === 'Legal Infrastructure') return 'Matter Management & Insights';
    return originalCat;
  }

  const grouped = {};
  const sortedTechInput = [...techs].sort((a,b) => (f(a,'Technology')||'').localeCompare(f(b,'Technology')||''));
  sortedTechInput.forEach(t => {
    const originalCat = f(t,'Tech Category') || 'Other';
    const cat = remapTechCat(f(t,'Technology') || '', originalCat);
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(t);
  });

  const grid = document.createElement('div');
  grid.className = 'tech-grid';

  const cats = catOrder.filter(c => grouped[c]).concat(
    Object.keys(grouped).filter(c => !catOrder.includes(c))
  );

  cats.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'tech-category-block';
    const cc = catClass(cat);

    block.innerHTML = `
      <div class="tech-cat-header">
        <div class="tech-cat-dot dot-${cc}"></div>
        <div class="tech-cat-name">${cat}</div>
      </div>
    `;

    const tags = document.createElement('div');
    tags.className = 'tech-tags';
    grouped[cat].forEach(t => {
      const tag = document.createElement('div');
      tag.className = 'tech-tag';
      tag.textContent = f(t,'Technology') || f(t,'Tech (Name)') || '';
      tag.addEventListener('click', () => openTechDrillDown(t));
      tags.appendChild(tag);
    });
    block.appendChild(tags);
    grid.appendChild(block);
  });

  panel.appendChild(grid);
}

      // Store employer lookup names for click navigation
      const collabEmps = c.fields['Employers'] || [];
      card.dataset.empLookup = Array.isArray(collabEmps) ? collabEmps.flat().join('|') : String(collabEmps);

      const dot = document.createElement('div');
      dot.className = 'collab-type-dot';
      dot.style.background = typeColors[type] || '#92784a';
      card.appendChild(dot);

      const bd = document.createElement('div');
      bd.style.flex = '1';
      const where = f(c,'Where');
      bd.innerHTML = `
        <div class="collab-name">${f(c,'Partner Team')}</div>
        ${f(c,'Representative Collaboration') ? `<div class="collab-rep">${f(c,'Representative Collaboration')}</div>` : ''}
        ${where ? `<div class="collab-where">${where}</div>` : ''}
      `;
      // Click collab card → open employer drawer if we can match an employer
      card.style.cursor = 'pointer';
      card.addEventListener('click', () => {
        const lookupVals = card.dataset.empLookup ? card.dataset.empLookup.split('|') : [];
        const emp = allEmployers.find(e =>
          lookupVals.some(v => v.trim() === f(e,'Employer').trim())
        );
        if (emp) openEmployerDrawer(emp);
      });
      card.appendChild(bd);
      grid.appendChild(card);
      allCards.push(card);
    });

    body.appendChild(grid);
    group.appendChild(body);
    panel.appendChild(group);
  });

  // ── Pill click: highlight matching, dim others ──
  let activeEnv = 'All';
  envFilter.addEventListener('click', e => {
    const pill = e.target.closest('.env-pill');
    if (!pill) return;
    activeEnv = pill.dataset.env;
    envFilter.querySelectorAll('.env-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');

    allCards.forEach(card => {
      card.classList.remove('highlighted','dimmed');
      if (activeEnv === 'All') return;
      if (card.dataset.env === activeEnv) {
        card.classList.add('highlighted');
      } else {
        card.classList.add('dimmed');
      }
    });

    // Auto-open both groups when filtering so highlighted cards are visible
    if (activeEnv !== 'All') {
      panel.querySelectorAll('.collab-group').forEach(g => g.classList.add('open'));
    }
  });
}


// ── TAB SWITCHING ─────────────────────────────────────────
document.querySelector('.tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(btn.dataset.tab).classList.add('active');
});

// ── MAIN LOAD ─────────────────────────────────────────────
async function loadAll() {
  try {
    const [headers, employers, positions, projects, skills, technologies, collabs] = await Promise.all([
      fetchAll('Headings_Titles'),
      fetchAll('Employers'),
      fetchAll('Positions'),
      fetchAll('Projects'),
      fetchAll('Skills'),
      fetchAll('Technologies'),
      fetchAll('Collaborations'),
    ]);

    // Store globals for drill-down cross-referencing
    allProjects     = projects;
    allSkills       = skills;
    allEmployers    = employers;
    allTechnologies = technologies;
    allPositions    = positions;
    allCollabs      = collabs;

    renderHeader(headers);
    renderExperience(employers, positions);
    renderProjects(projects);
    renderSkills(skills);
    renderTechnologies(technologies);
    renderCollaborations(collabs);

  } catch (err) {
    console.error(err);
    document.getElementById('experience').innerHTML = `
      <div class="error-msg">
        <strong>Error loading data:</strong> ${err.message}<br>
        <small>Check that your API token has read access to all tables.</small>
      </div>`;
  } finally {
    const loader = document.getElementById('loader');
    loader.classList.add('hidden');
    setTimeout(() => {
      loader.style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 500);
  }
}


// ── EMPLOYER DRAWER ──────────────────────────────────────
function openEmployerDrawer(emp) {
  const overlay  = document.getElementById('emp-drawer-overlay');
  const nameEl   = document.getElementById('emp-drawer-name');
  const metaEl   = document.getElementById('emp-drawer-meta');
  const bodyEl   = document.getElementById('emp-drawer-body');

  const empId    = emp.id;
  const empName  = f(emp,'Employer');
  const sd       = formatDate(f(emp,'Start Date'));
  const ed       = formatDate(f(emp,'End Date'));
  const industry = f(emp,'Industry');

  // ── Header ──
  nameEl.textContent = empName;
  metaEl.innerHTML = `
    <div class="emp-drawer-dates">${sd} – ${ed}</div>
    ${industry ? `<div class="emp-drawer-industry">${industry}</div>` : ''}
  `;

  bodyEl.innerHTML = '';

  // ── Positions ──
  const posList = allPositions.filter(p => (p.fields.Employer || []).includes(empId));
  if (posList.length) {
    const sec = document.createElement('div');
    sec.className = 'emp-drawer-section';
    sec.innerHTML = `<div class="emp-section-heading">Positions</div>`;
    posList.forEach(pos => {
      const item = document.createElement('div');
      item.className = 'emp-pos-item';
      item.innerHTML = `
        <div class="emp-pos-name">${f(pos,'Position')}</div>
        ${f(pos,'Focus') ? `<div class="emp-pos-focus">${f(pos,'Focus')}</div>` : ''}
        ${f(pos,'Team')  ? `<div class="emp-pos-team">${f(pos,'Team')}</div>` : ''}
      `;
      sec.appendChild(item);
    });
    bodyEl.appendChild(sec);
  }

  // ── Projects — grouped by Project Type with toggles ──
  const empProjects = allProjects.filter(p => {
    const links = p.fields['Employers'] || p.fields['Employer'] || [];
    return links.includes(empId);
  });
  if (empProjects.length) {
    const sec = document.createElement('div');
    sec.className = 'emp-drawer-section';
    sec.innerHTML = `<div class="emp-section-heading">Projects (${empProjects.length})</div>`;

    // Group by Project Type
    const ptGroups = {};
    empProjects.forEach(proj => {
      const pt = f(proj,'Project Type') || 'Other';
      if (!ptGroups[pt]) ptGroups[pt] = [];
      ptGroups[pt].push(proj);
    });

    Object.entries(ptGroups).forEach(([pt, projs], gIdx) => {
      const group = document.createElement('div');
      group.className = 'emp-pt-group' + (gIdx === 0 ? ' open' : '');
      group.style.marginBottom = '8px';

      const groupHdr = document.createElement('div');
      groupHdr.className = 'emp-pt-group-hdr';
      const cc = catClass(pt);
      groupHdr.innerHTML = `
        <span class="project-type-badge c-${cc}" style="font-size:0.68rem">${pt}</span>
        <span class="emp-pt-count">${projs.length}</span>
        <span class="emp-pt-toggle">▾</span>
      `;
      groupHdr.addEventListener('click', () => group.classList.toggle('open'));
      group.appendChild(groupHdr);

      const groupBody = document.createElement('div');
      groupBody.className = 'emp-pt-group-body';
      const grid = document.createElement('div');
      grid.className = 'emp-proj-grid';
      grid.style.paddingTop = '10px';
      projs.forEach(proj => {
        const card = document.createElement('div');
        card.className = 'emp-proj-card';
        card.innerHTML = `
          <div class="emp-proj-pa">${f(proj,'Practice Area') || ''}</div>
          <div class="emp-proj-title">${f(proj,'Project')}</div>
        `;
        card.addEventListener('click', () => {
          closeEmployerDrawer();
          setTimeout(() => openProjectModal(proj), 180);
        });
        grid.appendChild(card);
      });
      groupBody.appendChild(grid);
      group.appendChild(groupBody);
      sec.appendChild(group);
    });

    bodyEl.appendChild(sec);
  }

  // ── Bottom three-column chips: Tech | Skills | Collabs ──
  // Technologies: try direct lookup on employer record first, fallback to cross-ref via projects
  let empTechs = [];
  const directTechIds = emp.fields['Technologies'] || emp.fields['Tech'] || [];
  if (directTechIds.length) {
    empTechs = allTechnologies.filter(t => directTechIds.includes(t.id) || directTechIds.includes(f(t,'Technology')));
  }
  if (!empTechs.length) {
    const techIds = new Set();
    empProjects.forEach(p => (p.fields['Technologies'] || []).forEach(id => techIds.add(id)));
    empTechs = allTechnologies.filter(t => techIds.has(t.id));
  }

  // Skills: try direct lookup on employer record first, fallback to cross-ref via projects
  let empSkills = [];
  const directSkillIds = emp.fields['Skills'] || emp.fields['Skill Sets'] || [];
  if (directSkillIds.length) {
    empSkills = allSkills.filter(s => directSkillIds.includes(s.id) || directSkillIds.includes(f(s,'Skill')));
  }
  if (!empSkills.length) {
    const skillIds = new Set();
    empProjects.forEach(p => (p.fields['Skill Sets'] || []).forEach(id => skillIds.add(id)));
    empSkills = allSkills.filter(s => skillIds.has(s.id));
  }

  // Collabs: try direct lookup on employer record, fallback to name match
  let empCollabs = [];
  const directCollabIds = emp.fields['Collaborations'] || emp.fields['Collabs'] || [];
  if (directCollabIds.length) {
    empCollabs = allCollabs.filter(c => directCollabIds.includes(c.id) || directCollabIds.includes(f(c,'Partner Team')));
  }
  if (!empCollabs.length) {
    empCollabs = allCollabs.filter(c => {
      const lookupVals = c.fields['Employers'] || [];
      const flat = Array.isArray(lookupVals) ? lookupVals.flat() : [lookupVals];
      return flat.some(v => String(v).trim() === empName.trim());
    });
  }

  if (empTechs.length || empSkills.length || empCollabs.length) {
    const sec = document.createElement('div');
    sec.className = 'emp-drawer-section';
    sec.innerHTML = `<div class="emp-section-heading">At a Glance</div>`;

    const row = document.createElement('div');
    row.className = 'emp-chips-row';

    function makeChipCol(label, items, labelFn, onClickFn) {
      const col = document.createElement('div');
      col.innerHTML = `<div class="emp-chip-col-heading">${label}</div>`;
      const list = document.createElement('div');
      list.className = 'emp-chip-list';
      items.forEach(item => {
        const chip = document.createElement(onClickFn ? 'button' : 'span');
        chip.className = 'emp-chip';
        if (onClickFn) chip.style.cssText = 'cursor:pointer';
        chip.textContent = labelFn(item);
        if (onClickFn) chip.addEventListener('click', e => { e.stopPropagation(); onClickFn(item); });
        list.appendChild(chip);
      });
      if (!items.length) {
        const empty = document.createElement('span');
        empty.style.cssText = 'font-size:0.72rem;color:var(--ink-muted);font-style:italic';
        empty.textContent = '—';
        list.appendChild(empty);
      }
      col.appendChild(list);
      return col;
    }

    const sortedTechs   = [...empTechs].sort((a,b) => (f(a,'Technology')||'').localeCompare(f(b,'Technology')||''));
    const sortedSkills  = [...empSkills].sort((a,b) => (f(a,'Skill')||'').localeCompare(f(b,'Skill')||''));
    const sortedCollabs = [...empCollabs].sort((a,b) => (f(a,'Partner Team')||'').localeCompare(f(b,'Partner Team')||''));
    row.appendChild(makeChipCol('Technologies',  sortedTechs,   t => f(t,'Technology') || f(t,'Tech (Name)') || '', t => openTechDrillDown(t)));
    row.appendChild(makeChipCol('Skills',        sortedSkills,  s => f(s,'Skill') || ''));
    row.appendChild(makeChipCol('Collaborations',sortedCollabs, c => f(c,'Partner Team') || ''));

    sec.appendChild(row);
    bodyEl.appendChild(sec);
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeEmployerDrawer() {
  document.getElementById('emp-drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// Close on overlay click (outside drawer) or close button
document.getElementById('emp-drawer-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('emp-drawer-overlay')) closeEmployerDrawer();
});
document.getElementById('emp-drawer-close').addEventListener('click', closeEmployerDrawer);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEmployerDrawer();
});



// ── TECH DRILL-DOWN ──────────────────────────────────────
function openTechDrillDown(tech) {
  const overlay  = document.getElementById('tech-drill-overlay');
  const nameEl   = document.getElementById('tech-drill-name');
  const catEl    = document.getElementById('tech-drill-cat');
  const bodyEl   = document.getElementById('tech-drill-body');
  const backBtn  = document.getElementById('tech-drill-back');
  const hdrEl    = document.getElementById('tech-drill-header');

  const techName = f(tech,'Technology') || f(tech,'Tech (Name)') || '';
  const techCat  = f(tech,'Tech Category') || '';

  nameEl.textContent = techName;
  catEl.textContent  = techCat;
  bodyEl.innerHTML   = '';

  // Detect what's currently open beneath us
  const modalOpen  = document.getElementById('modal-overlay').classList.contains('open');
  const drawerOpen = document.getElementById('emp-drawer-overlay').classList.contains('open');
  const stacked    = modalOpen || drawerOpen;

  // Track the stack so ✕ knows what to close
  navStack = stacked ? (drawerOpen ? ['drawer'] : ['modal']) : [];

  // Show/hide back button
  if (stacked) {
    backBtn.classList.add('visible');
    hdrEl.classList.add('has-back');
  } else {
    backBtn.classList.remove('visible');
    hdrEl.classList.remove('has-back');
  }

  // ── Projects that use this tech ──
  const techProjects = allProjects.filter(p =>
    (p.fields['Technologies'] || []).includes(tech.id)
  );

  if (techProjects.length) {
    const sec = document.createElement('div');
    sec.className = 'sdp-section';
    sec.innerHTML = `<div class="sdp-section-label">Used In (${techProjects.length})</div>`;
    techProjects.forEach(proj => {
      const row = document.createElement('div');
      row.className = 'sdp-project-row';
      row.innerHTML = `
        <div class="sdp-proj-title">${f(proj,'Project')}</div>
        <div class="sdp-proj-meta">
          ${f(proj,'Practice Area') ? `<span class="sdp-proj-chip" style="background:var(--cream);color:var(--ink-soft)">${f(proj,'Practice Area')}</span>` : ''}
        </div>
      `;
      row.addEventListener('click', () => {
        closeTechDrillDown();
        setTimeout(() => openProjectModal(proj), 180);
      });
      sec.appendChild(row);
    });
    bodyEl.appendChild(sec);
  }

  // ── Employers that used this tech (via projects) ──
  const empIdSet = new Set();
  techProjects.forEach(p =>
    (p.fields['Employers'] || p.fields['Employer'] || []).forEach(id => empIdSet.add(id))
  );
  const techEmps = allEmployers.filter(e => empIdSet.has(e.id));

  if (techEmps.length) {
    const sec2 = document.createElement('div');
    sec2.className = 'sdp-section';
    sec2.innerHTML = `<div class="sdp-section-label">Deployed At</div>`;
    techEmps.forEach(emp => {
      const row = document.createElement('div');
      row.className = 'sdp-employer-row';
      row.style.cursor = 'pointer';
      row.textContent = f(emp,'Employer');
      row.addEventListener('click', () => {
        closeTechDrillDown();
        setTimeout(() => openEmployerDrawer(emp), 180);
      });
      sec2.appendChild(row);
    });
    bodyEl.appendChild(sec2);
  }

  if (!techProjects.length && !techEmps.length) {
    bodyEl.innerHTML = '<div style="font-size:0.82rem;color:var(--ink-muted);font-style:italic;padding:8px 0">No linked projects found.</div>';
  }

  overlay.classList.add('open');
}

function closeTechDrillDown() {
  document.getElementById('tech-drill-overlay').classList.remove('open');
  navStack = [];
}

function closeTechDrillDownAll() {
  // ✕ — close tech panel AND everything beneath it
  document.getElementById('tech-drill-overlay').classList.remove('open');
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('emp-drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
  navStack = [];
}

// ‹ Back — close only tech panel, leave whatever is behind it open
document.getElementById('tech-drill-back').addEventListener('click', e => {
  e.stopPropagation();
  closeTechDrillDown();
});

// ✕ — close tech panel + everything behind it
document.getElementById('tech-drill-close').addEventListener('click', closeTechDrillDownAll);

// Clicking the overlay backdrop when NOT stacked closes just the panel
document.getElementById('tech-drill-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    if (navStack.length) {
      closeTechDrillDown(); // stacked: back behavior on backdrop tap
    } else {
      closeTechDrillDownAll();
    }
  }
});


loadAll();
</script>
