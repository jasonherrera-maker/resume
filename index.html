<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jason Herrera — Senior Legal Operations & Program Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:       #1c1917;
    --ink-soft:  #44403c;
    --ink-muted: #78716c;
    --paper:     #faf9f7;
    --cream:     #f5f0e8;
    --rule:      #e7e2d9;
    --gold:      #92784a;
    --gold-lt:   #c9b07a;
    --gold-bg:   #f7f3ec;
    --cat1: #eef2ff; --cat1d: #4f46e5;
    --cat2: #ecfdf5; --cat2d: #059669;
    --cat3: #fff7ed; --cat3d: #c2620a;
    --cat4: #eff6ff; --cat4d: #2563eb;
    --cat5: #fdf2f8; --cat5d: #a21caf;
    --cat6: #f0fdf4; --cat6d: #16a34a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── LOADER ── */
  #loader {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    transition: opacity 0.5s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-inner { text-align: center; }
  .loader-ring {
    width: 40px; height: 40px;
    border: 2px solid var(--rule);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  .loader-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--ink-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LAYOUT ── */
  #app { opacity: 0; transition: opacity 0.6s ease; }
  #app.visible { opacity: 1; }

  .page-wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  /* header bleeds to viewport edges */
  header {
    margin-left: -32px;
    margin-right: -32px;
  }

  @media (max-width: 640px) {
    .page-wrap { padding: 0 16px 60px; }
    header { margin-left: -16px; margin-right: -16px; padding: 36px 16px 32px; }
    .projects-grid { grid-template-columns: 1fr; }
    .modal { padding: 24px 20px; }
  }

  /* ── HEADER ── */
  header {
    background: #1a1714;
    padding: 52px 32px 44px;
    margin-left: calc(-32px);
    margin-right: calc(-32px);
    margin-bottom: 0;
  }

  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
  }

  .name-block h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.6rem, 5.5vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.03em;
    line-height: 1;
    color: #f5f0e8;
  }

  .name-block h1 .first-name {
    color: #f5f0e8;
    font-weight: 300;
  }

  .name-block h1 .last-name {
    color: var(--gold-lt);
    font-weight: 400;
    font-style: italic;
  }

  .taglines {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    margin-top: 12px;
    align-items: center;
  }

  .tagline-item {
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #a89468;
  }

  .tagline-sep {
    color: #4a4540;
    margin: 0 10px;
    font-size: 0.7rem;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #2e2a26;
    align-items: center;
  }

  .contact-item {
    font-size: 0.78rem;
    color: #c8bfa8; /* cream — for location & phone */
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .contact-item.contact-link {
    color: var(--gold-lt); /* gold — for email & LinkedIn */
  }
  .contact-item:hover { color: #fff; }
  .contact-icon { font-size: 0.75rem; opacity: 0.6; }

  /* ── NAV TABS ── */
  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 40px;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 100;
    box-shadow: 0 1px 0 var(--rule);
  }
  .tab-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    padding: 16px 22px 14px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── SECTION PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── EXPERIENCE ── */
  .employer-block {
    border-left: 2px solid var(--rule);
    padding-left: 28px;
    margin-bottom: 44px;
    position: relative;
  }

  .employer-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px 24px;
    cursor: pointer;
    border: 1px solid var(--rule);
    border-left: 3px solid var(--rule);
    background: white;
    transition: border-left-color 0.2s, background 0.15s;
    user-select: none;
  }
  .employer-header:hover { border-left-color: var(--gold-lt); background: var(--gold-bg); }
  .employer-block.open .employer-header {
    border-left-color: var(--gold);
    background: var(--gold-bg);
    border-bottom: 1px solid var(--rule);
  }

  .employer-header-left { flex: 1; }

  .employer-toggle {
    font-size: 0.75rem;
    color: var(--ink-muted);
    transition: transform 0.25s;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .employer-block.open .employer-toggle { transform: rotate(180deg); color: var(--gold); }

  .employer-body {
    display: none;
    padding: 20px 24px 24px;
    border: 1px solid var(--rule);
    border-top: none;
    border-left: 3px solid var(--gold);
    background: white;
    animation: fadeUp 0.2s ease;
  }
  .employer-block.open .employer-body { display: block; }

  .employer-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .employer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
  }

  .employer-dates {
    font-size: 0.72rem;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .employer-industry {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    padding: 2px 8px;
    background: var(--gold-bg);
    border-radius: 3px;
  }

  .position-list { margin-bottom: 14px; }
  .position-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--rule);
  }
  .position-item:last-child { border-bottom: none; }
  .position-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold-lt);
    margin-top: 6px;
    flex-shrink: 0;
  }
  .position-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink);
  }
  .position-focus {
    font-size: 0.78rem;
    color: var(--ink-muted);
    margin-top: 1px;
  }
  .position-team {
    font-size: 0.72rem;
    color: var(--ink-muted);
    font-style: italic;
  }

  .key-legacy {
    margin-top: 4px;
    padding: 12px 16px;
    background: var(--cream);
    border-left: 3px solid var(--gold-lt);
    font-size: 0.82rem;
    color: var(--ink-soft);
    line-height: 1.65;
    font-style: italic;
  }

  /* ── PROJECTS ── */
  .projects-filter {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: white;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--gold-lt); color: var(--gold); }
  .filter-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .project-card {
    background: white;
    border: 1px solid var(--rule);
    border-top: 3px solid var(--gold-lt);
    padding: 20px 22px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s, border-top-color 0.2s;
  }
  .project-card:hover {
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
    transform: translateY(-2px);
    border-top-color: var(--gold);
  }

  .project-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
  }

  .project-type-badge {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .project-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.35;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .project-summary {
    font-size: 0.8rem;
    color: var(--ink-soft);
    line-height: 1.55;
    margin-bottom: 12px;
  }

  .project-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
  }

  .meta-chip {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 3px;
    background: var(--cream);
    color: var(--ink-soft);
    font-weight: 500;
  }

  .expand-hint {
    font-size: 0.7rem;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  /* Project Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(28,25,23,0.55);
    backdrop-filter: blur(3px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--paper);
    max-width: 680px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 36px 40px;
    position: relative;
    transform: translateY(16px);
    transition: transform 0.25s;
    border-top: 4px solid var(--gold);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none; border: none;
    font-size: 1.4rem;
    color: var(--ink-muted);
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .modal-close:hover { color: var(--ink); }

  .modal-badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 16px;
    color: var(--ink);
  }

  .modal-section { margin-bottom: 20px; }
  .modal-section-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .modal-section-body {
    font-size: 0.875rem;
    color: var(--ink-soft);
    line-height: 1.65;
  }

  .modal-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .modal-chip {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 3px;
    background: var(--cream);
    color: var(--ink-soft);
    font-weight: 400;
  }

  /* ── SKILLS ── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .skill-category-block {
    background: white;
    border: 1px solid var(--rule);
    padding: 22px 24px 26px;
  }

  .skill-cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  .skill-cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .skill-cat-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink);
  }

  .skill-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .skill-item:last-child { border-bottom: none; padding-bottom: 0; }

  .skill-name {
    font-size: 0.82rem;
    color: var(--ink-soft);
    font-weight: 500;
    line-height: 1.3;
  }
  .skill-summary-text {
    font-size: 0.72rem;
    color: var(--ink-muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  /* ── TECHNOLOGIES ── */
  .tech-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }

  .tech-category-block {
    background: white;
    border: 1px solid var(--rule);
    padding: 22px 24px 26px;
  }

  .tech-cat-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  .tech-cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tech-cat-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink);
  }

  .tech-tags { display: flex; flex-wrap: wrap; gap: 7px; }

  .tech-tag {
    font-size: 0.75rem;
    font-weight: 400;
    padding: 5px 11px;
    border: 1px solid var(--rule);
    color: var(--ink-soft);
    transition: all 0.15s;
    cursor: default;
  }
  .tech-tag:hover { border-color: var(--gold-lt); color: var(--gold); background: var(--gold-bg); }

  /* ── COLLABORATIONS ── */
  .collab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .collab-card {
    background: white;
    border: 1px solid var(--rule);
    padding: 18px 20px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: box-shadow 0.2s;
  }
  .collab-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

  .collab-type-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 4px;
    flex-shrink: 0;
  }

  .collab-name {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .collab-rep {
    font-size: 0.76rem;
    color: var(--ink-muted);
    line-height: 1.45;
    font-style: italic;
  }

  .collab-where {
    font-size: 0.68rem;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 0.06em;
    margin-top: 5px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  /* Employment History heading — larger, matches original prototype */
  .experience-heading {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }
  .experience-heading h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .experience-heading-hint {
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    font-weight: 400;
  }

  /* ── COLLAB ACCORDION ── */
  .collab-group { margin-bottom: 28px; }

  .collab-group-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    background: white;
    border: 1px solid var(--rule);
    border-left: 3px solid var(--rule);
    cursor: pointer;
    user-select: none;
    transition: border-left-color 0.2s, background 0.15s;
    margin-bottom: 0;
  }
  .collab-group-header:hover { border-left-color: var(--gold-lt); background: var(--gold-bg); }
  .collab-group.open .collab-group-header {
    border-left-color: var(--gold);
    border-bottom: 1px solid var(--rule);
  }

  .collab-group-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--ink);
    flex: 1;
  }
  .collab-group-count {
    font-size: 0.72rem;
    color: var(--ink-muted);
    letter-spacing: 0.08em;
  }
  .collab-group-toggle {
    font-size: 0.8rem;
    color: var(--ink-muted);
    transition: transform 0.25s;
  }
  .collab-group.open .collab-group-toggle { transform: rotate(180deg); color: var(--gold); }

  .collab-group-body {
    display: none;
    border: 1px solid var(--rule);
    border-top: none;
    border-left: 3px solid var(--gold-lt);
    padding: 16px;
  }
  .collab-group.open .collab-group-body { display: block; animation: fadeUp 0.2s ease; }

  /* Environment filter pills */
  .collab-env-filter {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .env-pill {
    padding: 5px 16px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: white;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.2s;
  }
  .env-pill:hover { border-color: var(--gold-lt); color: var(--gold); }
  .env-pill.active { background: var(--ink); color: white; border-color: var(--ink); }

  /* highlight / dim on env filter */
  .collab-card { transition: opacity 0.25s, box-shadow 0.2s, border-left 0.25s; }
  .collab-card.dimmed { opacity: 0.22; }
  .collab-card.highlighted { border-left: 3px solid var(--gold) !important; background: var(--gold-bg) !important; }


  /* ── CATEGORY COLORS ── */
  .c-sys   { background: var(--cat1); color: var(--cat1d); }
  .c-proc  { background: var(--cat2); color: var(--cat2d); }
  .c-prog  { background: var(--cat3); color: var(--cat3d); }
  .c-legal { background: var(--cat4); color: var(--cat4d); }
  .c-trial { background: var(--cat5); color: var(--cat5d); }
  .c-lead  { background: var(--cat6); color: var(--cat6d); }
  .dot-sys   { background: var(--cat1d); }
  .dot-proc  { background: var(--cat2d); }
  .dot-prog  { background: var(--cat3d); }
  .dot-legal { background: var(--cat4d); }
  .dot-trial { background: var(--cat5d); }
  .dot-lead  { background: var(--cat6d); }

  /* ── ERROR ── */
  .error-msg {
    padding: 24px;
    background: #fef2f2;
    border-left: 3px solid #ef4444;
    color: #7f1d1d;
    font-size: 0.85rem;
    margin: 32px 0;
  }

  /* ── SKILL DRILL-DOWN PANEL ── */
  .skill-drill-overlay {
    position: fixed; inset: 0;
    background: rgba(28,25,23,0.45);
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .skill-drill-overlay.open { opacity: 1; pointer-events: all; }

  .skill-drill-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(520px, 96vw);
    background: var(--paper);
    border-left: 1px solid var(--rule);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
    z-index: 201;
    overflow: hidden;
  }
  .skill-drill-overlay.open .skill-drill-panel {
    transform: translateX(0);
  }

  .sdp-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--rule);
    background: white;
    flex-shrink: 0;
  }
  .sdp-close {
    position: absolute;
    top: 20px; right: 24px;
    background: none; border: none;
    font-size: 1.1rem; cursor: pointer;
    color: var(--ink-muted);
    padding: 4px 8px;
    transition: color 0.15s;
  }
  .sdp-close:hover { color: var(--ink); }

  .sdp-skill-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 4px 12px 4px 8px;
    border-radius: 3px;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .sdp-skill-badge .sdp-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  .sdp-skill-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .sdp-skill-summary {
    font-size: 0.8rem;
    color: var(--ink-muted);
    line-height: 1.55;
  }

  .sdp-meta-row {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .sdp-meta-item {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .sdp-meta-item strong {
    color: var(--gold);
    font-weight: 600;
  }

  .sdp-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px 40px;
  }

  .sdp-section { margin-bottom: 28px; }
  .sdp-section-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--rule);
  }

  /* Project rows inside drill-down */
  .sdp-project-row {
    padding: 10px 0;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 2px;
  }
  .sdp-project-row:last-child { border-bottom: none; }
  .sdp-project-row:hover { background: var(--gold-bg); padding-left: 8px; }

  .sdp-proj-title {
    font-size: 0.82rem;
    color: var(--ink);
    line-height: 1.4;
    font-weight: 400;
  }
  .sdp-proj-meta {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .sdp-proj-chip {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 2px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  /* Employer rows inside drill-down */
  .sdp-employer-row {
    padding: 8px 0;
    border-bottom: 1px dashed var(--rule);
    font-size: 0.82rem;
    color: var(--ink-soft);
  }
  .sdp-employer-row:last-child { border-bottom: none; }

  /* Skill chip — clickable in project modal */
  .skill-chip-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px 3px 7px;
    border-radius: 3px;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
    text-decoration: none;
    border: none;
    margin: 2px;
  }
  .skill-chip-link:hover { filter: brightness(0.9); transform: translateY(-1px); }
  .skill-chip-link .sc-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    opacity: 0.7;
  }

  /* Skill items in Skills tab — clickable */
  .skill-item {
    cursor: pointer;
    transition: background 0.15s, padding-left 0.15s;
    border-radius: 3px;
  }
  .skill-item:hover {
    background: var(--gold-bg);
    padding-left: 8px;
  }
  .skill-item-arrow {
    font-size: 0.65rem;
    color: var(--gold-lt);
    margin-left: auto;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .skill-item:hover .skill-item-arrow { color: var(--gold); }

</style>
</head>
<body>

<div id="loader">
  <div class="loader-inner">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading</div>
  </div>
</div>

<div id="app">
<div class="page-wrap">

  <!-- HEADER -->
  <header id="header-section">
    <div class="header-inner">
      <div class="name-block">
        <h1><span class="first-name" id="hdr-first">Jason</span> <span class="last-name" id="hdr-last">Herrera</span></h1>
        <div class="taglines" id="hdr-taglines">
          <span class="tagline-item">Senior Legal Operations & Program Manager</span>
          <span class="tagline-sep">·</span>
          <span class="tagline-item">Systems Architect</span>
          <span class="tagline-sep">·</span>
          <span class="tagline-item">Legal Tech Specialist</span>
        </div>
      </div>
      <div class="contact-row" id="hdr-contact"></div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="experience">Experience</button>
    <button class="tab-btn" data-tab="projects">Projects</button>
    <button class="tab-btn" data-tab="skills">Skills</button>
    <button class="tab-btn" data-tab="technologies">Technologies</button>
    <button class="tab-btn" data-tab="collaborations">Collaborations</button>
  </div>

  <!-- PANELS -->
  <div id="experience" class="panel active"></div>
  <div id="projects"   class="panel"></div>
  <div id="skills"     class="panel"></div>
  <div id="technologies" class="panel"></div>
  <div id="collaborations" class="panel"></div>

</div><!-- /page-wrap -->
</div><!-- /app -->

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-inner">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- SKILL DRILL-DOWN PANEL -->
<div class="skill-drill-overlay" id="skill-drill-overlay">
  <div class="skill-drill-panel" id="skill-drill-panel">
    <div class="sdp-header">
      <button class="sdp-close" id="sdp-close">✕</button>
      <div id="sdp-header-content"></div>
    </div>
    <div class="sdp-body" id="sdp-body"></div>
  </div>
</div>

<script>
// ── HELPERS ──────────────────────────────────────────────
// All Airtable calls go through /api/airtable — token never touches the browser
async function fetchAll(table) {
  let records = [], offset = null;
  do {
    const url = `/api/airtable?table=${encodeURIComponent(table)}${offset ? '&offset=' + offset : ''}`;
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(`${table}: ${data.error}`);
    records.push(...data.records);
    offset = data.offset || null;
  } while (offset);
  return records;
}

function f(rec, field) {
  return (rec.fields && rec.fields[field]) || '';
}

function catClass(cat) {
  const map = {
    'Systems & Technology':           'sys',
    'Process Design & Operations':    'proc',
    'Program & Compliance Management':'prog',
    'Legal Practice & Execution':     'legal',
    'Trial & Hearing Support':        'trial',
    'Leadership & Development':       'lead',
    // Tech categories
    'AI & Emerging Tech':             'sys',
    'Legal Research & Compliance':    'legal',
    'Litigation & Matter Management': 'trial',
    'Productivity & Collaboration':   'proc',
    'Data & Knowledge Management':    'prog',
  };
  return map[cat] || 'prog';
}

function formatDate(d) {
  if (!d) return 'Present';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

// ── RENDER HEADER ────────────────────────────────────────
function renderHeader(recs) {
  if (!recs.length) return;
  const r = recs[0];

  // Split name → first (light) / last (italic gold)
  const fullName = f(r,'Name') || 'Jason Herrera';
  const parts    = fullName.trim().split(' ');
  const firstName = parts[0];
  const lastName  = parts.slice(1).join(' ');
  document.getElementById('hdr-first').textContent = firstName;
  document.getElementById('hdr-last').textContent  = lastName;

  // Taglines from Airtable Title1/2/3
  const t1 = f(r,'Title1'), t2 = f(r,'Title2'), t3 = f(r,'Title3');
  if (t1 || t2 || t3) {
    const tl = document.getElementById('hdr-taglines');
    tl.innerHTML = '';
    [t1,t2,t3].filter(Boolean).forEach((t,i,arr) => {
      const sp = document.createElement('span');
      sp.className = 'tagline-item'; sp.textContent = t;
      tl.appendChild(sp);
      if (i < arr.length-1) {
        const sep = document.createElement('span');
        sep.className = 'tagline-sep'; sep.textContent = '·';
        tl.appendChild(sep);
      }
    });
  }

  // Contact row — inline left-to-right
  const contact = document.getElementById('hdr-contact');
  const items = [
    { val: f(r,'Location'),     icon: '📍', href: null,                                    link: false },
    { val: f(r,'Phone Number'), icon: '☎',  href: `tel:${f(r,'Phone Number')}`,            link: false },
    { val: f(r,'Email'),        icon: '✉',  href: `mailto:${f(r,'Email')}`,                link: true  },
    { val: f(r,'URL1') ? 'linkedin.com/in/jason-u-herrera' : '', icon: '↗', href: f(r,'URL1'), link: true },
  ];
  items.filter(i => i.val).forEach(item => {
    const a = document.createElement(item.href ? 'a' : 'span');
    a.className = 'contact-item' + (item.link ? ' contact-link' : '');
    if (item.href) {
      a.href = item.href;
      if (item.href.startsWith('http')) a.target = '_blank';
    }
    a.innerHTML = `<span class="contact-icon">${item.icon}</span>${item.val}`;
    contact.appendChild(a);
  });
}

// ── RENDER EXPERIENCE ────────────────────────────────────
function renderExperience(employers, positions) {
  const posMap = {};
  positions.forEach(p => {
    const empLinks = p.fields.Employer || [];
    empLinks.forEach(eid => {
      if (!posMap[eid]) posMap[eid] = [];
      posMap[eid].push(p);
    });
  });

  const sorted = [...employers].sort((a,b) => {
    const da = f(a,'Start Date') ? new Date(f(a,'Start Date')) : new Date(0);
    const db = f(b,'Start Date') ? new Date(f(b,'Start Date')) : new Date(0);
    return db - da;
  });

  const panel = document.getElementById('experience');
  panel.innerHTML = `
    <div class="experience-heading">
      <h2>Employment History</h2>
      <span class="experience-heading-hint">Click any employer to expand</span>
    </div>
  `;

  sorted.forEach((emp, idx) => {
    const block = document.createElement('div');
    block.className = 'employer-block' + (idx === 0 ? ' open' : '');
    block.style.marginBottom = '12px';

    const sd = formatDate(f(emp,'Start Date'));
    const ed = formatDate(f(emp,'End Date'));
    const industry = f(emp,'Industry');

    // ── HEADER (clickable toggle) ──
    const hdr = document.createElement('div');
    hdr.className = 'employer-header';
    hdr.innerHTML = `
      <div class="employer-header-left">
        <div class="employer-meta">
          <div class="employer-name">${f(emp,'Employer')}</div>
          <div class="employer-dates">${sd} – ${ed}</div>
          ${industry ? `<div class="employer-industry">${industry}</div>` : ''}
        </div>
      </div>
      <div class="employer-toggle">▾</div>
    `;
    hdr.addEventListener('click', () => {
      block.classList.toggle('open');
    });
    block.appendChild(hdr);

    // ── BODY (collapsible) ──
    const body = document.createElement('div');
    body.className = 'employer-body';

    const posList = posMap[emp.id] || [];
    if (posList.length) {
      const pl = document.createElement('div');
      pl.className = 'position-list';
      posList.forEach(pos => {
        const pi = document.createElement('div');
        pi.className = 'position-item';
        pi.innerHTML = `
          <div class="position-dot"></div>
          <div>
            <div class="position-name">${f(pos,'Position')}</div>
            ${f(pos,'Focus')  ? `<div class="position-focus">${f(pos,'Focus')}</div>` : ''}
            ${f(pos,'Team')   ? `<div class="position-team">${f(pos,'Team')}</div>` : ''}
          </div>
        `;
        pl.appendChild(pi);
      });
      body.appendChild(pl);
    }

    if (f(emp,'Key Legacy')) {
      const kl = document.createElement('div');
      kl.className = 'key-legacy';
      kl.textContent = f(emp,'Key Legacy');
      body.appendChild(kl);
    }

    block.appendChild(body);
    panel.appendChild(block);
  });
}

// ── RENDER PROJECTS ──────────────────────────────────────
function renderProjects(projects) {
  const panel = document.getElementById('projects');
  panel.innerHTML = '';

  // Collect unique Project Types
  const types = [...new Set(projects.map(p => f(p,'Project Type')).filter(Boolean))].sort();

  const filterRow = document.createElement('div');
  filterRow.className = 'projects-filter';

  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'All';
  allBtn.dataset.filter = '';
  filterRow.appendChild(allBtn);

  types.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = t;
    btn.dataset.filter = t;
    filterRow.appendChild(btn);
  });
  panel.appendChild(filterRow);

  const grid = document.createElement('div');
  grid.className = 'projects-grid';
  grid.id = 'projects-grid';
  panel.appendChild(grid);

  filterRow.addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    filterRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    renderProjectCards(allProjects, e.target.dataset.filter);
  });

  renderProjectCards(projects, '');
}

function renderProjectCards(projects, filter) {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '';
  const filtered = filter ? projects.filter(p => f(p,'Project Type') === filter) : projects;

  filtered.forEach(proj => {
    const card = document.createElement('div');
    card.className = 'project-card';

    const pt = f(proj,'Project Type');
    const cc = catClass(pt);

    const hdr = document.createElement('div');
    hdr.className = 'project-card-header';

    const pa = document.createElement('div');
    pa.className = 'meta-chip';
    pa.textContent = f(proj,'Practice Area') || '';
    hdr.appendChild(pa);

    if (pt) {
      const badge = document.createElement('span');
      badge.className = `project-type-badge c-${cc}`;
      badge.textContent = pt;
      hdr.appendChild(badge);
    }
    card.appendChild(hdr);

    const title = document.createElement('div');
    title.className = 'project-title';
    const raw = f(proj,'Project');
    title.textContent = raw.length > 90 ? raw.slice(0,87)+'…' : raw;
    card.appendChild(title);

    const summ = f(proj,'Project Summary');
    if (summ) {
      const s = document.createElement('div');
      s.className = 'project-summary';
      s.textContent = summ.length > 140 ? summ.slice(0,137)+'…' : summ;
      card.appendChild(s);
    }

    const ps = f(proj,'Primary Skill');
    if (ps) {
      const row = document.createElement('div');
      row.className = 'project-meta-row';
      const chip = document.createElement('span');
      chip.className = 'meta-chip';
      chip.textContent = ps;
      row.appendChild(chip);
      card.appendChild(row);
    }

    const hint = document.createElement('div');
    hint.className = 'expand-hint';
    hint.textContent = '↗ View details';
    card.appendChild(hint);

    card.addEventListener('click', () => openProjectModal(proj));
    grid.appendChild(card);
  });
}

function openProjectModal(proj) {
  const pt = f(proj,'Project Type');
  const cc = catClass(pt);
  const overlay = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');

  const badges = `
    <div class="modal-badge-row">
      ${pt ? `<span class="project-type-badge c-${cc}">${pt}</span>` : ''}
      ${f(proj,'Practice Area') ? `<span class="project-type-badge" style="background:var(--cream);color:var(--ink-soft)">${f(proj,'Practice Area')}</span>` : ''}
      ${f(proj,'Setting') ? `<span class="project-type-badge" style="background:var(--cream);color:var(--ink-muted)">${f(proj,'Setting')}</span>` : ''}
    </div>
  `;

  const sections = [
    { label: 'Summary',          val: f(proj,'Project Summary') },
    { label: 'Problem',          val: f(proj,'Problem Statement') },
    { label: 'Execution',        val: f(proj,'Execution Path') },
    { label: 'Outcome & Impact', val: f(proj,'Outcome / Impact') },
  ].filter(s => s.val);

  // Skill chips — linked record IDs, look up from allSkills
  const skillLinks = (proj.fields['Skill Sets'] || []);
  let skillChipsHtml = '';
  if (skillLinks.length && allSkills.length) {
    const chips = skillLinks.map(sid => {
      const sk = allSkills.find(s => s.id === sid);
      if (!sk) return '';
      const scat = f(sk,'Skill Type');
      const scc  = catClass(scat);
      const bgVar = `var(--cat${catIndex(scat)})`;
      const fgVar = `var(--cat${catIndex(scat)}d)`;
      return `<button class="skill-chip-link" data-skill-id="${sid}"
        style="background:${bgVar};color:${fgVar}">
        <span class="sc-dot" style="background:${fgVar}"></span>${f(sk,'Skill')}
      </button>`;
    }).join('');
    if (chips) {
      skillChipsHtml = `
        <div class="modal-section">
          <div class="modal-section-label">Skills</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px">${chips}</div>
        </div>`;
    }
  }

  content.innerHTML = `
    ${badges}
    <div class="modal-title">${f(proj,'Project')}</div>
    ${sections.map(s => `
      <div class="modal-section">
        <div class="modal-section-label">${s.label}</div>
        <div class="modal-section-body">${s.val}</div>
      </div>
    `).join('')}
    ${skillChipsHtml}
  `;

  // Wire skill chip clicks
  content.querySelectorAll('.skill-chip-link').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const sk = allSkills.find(s => s.id === btn.dataset.skillId);
      if (sk) openSkillDrillDown(sk);
    });
  });

  overlay.classList.add('open');
}

// ── SKILL DRILL-DOWN ─────────────────────────────────────
let allSkills   = [];
let allProjects = [];

function catIndex(cat) {
  const map = {
    'Systems & Technology': 1,
    'Process Design & Operations': 2,
    'Program & Compliance Management': 3,
    'Legal Practice & Execution': 4,
    'Trial & Hearing Support': 5,
    'Leadership & Development': 6,
    'AI & Emerging Tech': 1,
    'Legal Research & Compliance': 4,
    'Litigation & Matter Management': 5,
    'Productivity & Collaboration': 2,
    'Data & Knowledge Management': 3,
  };
  return map[cat] || 3;
}

function openSkillDrillDown(skill) {
  const overlay = document.getElementById('skill-drill-overlay');
  const hdrEl   = document.getElementById('sdp-header-content');
  const bodyEl  = document.getElementById('sdp-body');

  const scat = f(skill,'Skill Type');
  const ci   = catIndex(scat);
  const cc   = catClass(scat);

  // ── Header ──
  const proficiency = f(skill,'Skill Proficiency');
  const tier        = f(skill,'Strategic Tier');
  hdrEl.innerHTML = `
    <div class="sdp-skill-badge c-${cc}">
      <span class="sdp-dot dot-${cc}"></span>${scat}
    </div>
    <div class="sdp-skill-name">${f(skill,'Skill')}</div>
    ${f(skill,'Skill Summary') ? `<div class="sdp-skill-summary">${f(skill,'Skill Summary')}</div>` : ''}
    <div class="sdp-meta-row">
      ${proficiency ? `<div class="sdp-meta-item">Proficiency <strong>${proficiency}</strong></div>` : ''}
      ${tier ? `<div class="sdp-meta-item">Tier <strong>${tier}</strong></div>` : ''}
    </div>
  `;

  // ── Body: linked projects ──
  bodyEl.innerHTML = '';
  const linkedProjIds = skill.fields['Projects'] || [];
  const linkedProjs   = allProjects.filter(p => linkedProjIds.includes(p.id));

  if (linkedProjs.length) {
    const sec = document.createElement('div');
    sec.className = 'sdp-section';
    sec.innerHTML = `<div class="sdp-section-label">Projects (${linkedProjs.length})</div>`;

    linkedProjs.forEach(proj => {
      const pt  = f(proj,'Project Type');
      const pcc = catClass(pt);
      const row = document.createElement('div');
      row.className = 'sdp-project-row';
      const title = f(proj,'Project');
      const setting = f(proj,'Setting');
      row.innerHTML = `
        <div class="sdp-proj-title">${title}</div>
        <div class="sdp-proj-meta">
          ${pt ? `<span class="sdp-proj-chip c-${pcc}">${pt}</span>` : ''}
          ${setting ? `<span class="sdp-proj-chip" style="background:var(--cream);color:var(--ink-muted)">${setting}</span>` : ''}
        </div>
      `;
      // Click a project row → close drill-down, open project modal
      row.addEventListener('click', () => {
        closeSkillDrillDown();
        setTimeout(() => openProjectModal(proj), 180);
      });
      sec.appendChild(row);
    });
    bodyEl.appendChild(sec);
  }

  // ── Body: linked employers (via projects) ──
  const empNames = new Set();
  linkedProjs.forEach(p => {
    const emps = f(p,'Employers');
    if (emps) emps.split(',').forEach(e => { const t = e.trim(); if (t) empNames.add(t); });
  });

  if (empNames.size) {
    const sec2 = document.createElement('div');
    sec2.className = 'sdp-section';
    sec2.innerHTML = `<div class="sdp-section-label">Deployed At</div>`;
    empNames.forEach(name => {
      const row = document.createElement('div');
      row.className = 'sdp-employer-row';
      row.textContent = name;
      sec2.appendChild(row);
    });
    bodyEl.appendChild(sec2);
  }

  overlay.classList.add('open');
  // Switch to skills tab context if not already in a modal
  document.getElementById('skill-drill-panel').scrollTop = 0;
}

function closeSkillDrillDown() {
  document.getElementById('skill-drill-overlay').classList.remove('open');
}

document.getElementById('sdp-close').addEventListener('click', closeSkillDrillDown);
document.getElementById('skill-drill-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeSkillDrillDown();
});
// ESC closes both panels
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeSkillDrillDown();
    document.getElementById('modal-overlay').classList.remove('open');
  }
});

// ── RENDER SKILLS ─────────────────────────────────────────
function renderSkills(skills) {
  const panel = document.getElementById('skills');
  panel.innerHTML = '<div class="section-title">Core Competencies</div>';

  const catOrder = [
    'Systems & Technology',
    'Process Design & Operations',
    'Program & Compliance Management',
    'Legal Practice & Execution',
    'Trial & Hearing Support',
    'Leadership & Development',
  ];

  const grouped = {};
  skills.forEach(s => {
    const cat = f(s,'Skill Type') || 'Other';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(s);
  });

  const grid = document.createElement('div');
  grid.className = 'skills-grid';

  const cats = catOrder.filter(c => grouped[c]).concat(
    Object.keys(grouped).filter(c => !catOrder.includes(c))
  );

  cats.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'skill-category-block';
    const cc = catClass(cat);

    block.innerHTML = `
      <div class="skill-cat-header">
        <div class="skill-cat-dot dot-${cc}"></div>
        <div class="skill-cat-name">${cat}</div>
      </div>
    `;

    grouped[cat].forEach(s => {
      const item = document.createElement('div');
      item.className = 'skill-item';
      item.innerHTML = `
        <div style="flex:1">
          <div class="skill-name">${f(s,'Skill')}</div>
          ${f(s,'Skill Summary') ? `<div class="skill-summary-text">${f(s,'Skill Summary')}</div>` : ''}
        </div>
        <div class="skill-item-arrow">↗</div>
      `;
      item.style.display = 'flex';
      item.style.alignItems = 'flex-start';
      item.style.justifyContent = 'space-between';
      item.addEventListener('click', () => openSkillDrillDown(s));
      block.appendChild(item);
    });

    grid.appendChild(block);
  });

  panel.appendChild(grid);
}

// ── RENDER TECHNOLOGIES ──────────────────────────────────
function renderTechnologies(techs) {
  const panel = document.getElementById('technologies');
  panel.innerHTML = '<div class="section-title">Technical Proficiencies</div>';

  const catOrder = [
    'AI & Emerging Tech',
    'Litigation & Matter Management',
    'Legal Research & Compliance',
    'Data & Knowledge Management',
    'Productivity & Collaboration',
  ];

  const grouped = {};
  techs.forEach(t => {
    const cat = f(t,'Tech Category') || 'Other';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(t);
  });

  const grid = document.createElement('div');
  grid.className = 'tech-grid';

  const cats = catOrder.filter(c => grouped[c]).concat(
    Object.keys(grouped).filter(c => !catOrder.includes(c))
  );

  cats.forEach(cat => {
    const block = document.createElement('div');
    block.className = 'tech-category-block';
    const cc = catClass(cat);

    block.innerHTML = `
      <div class="tech-cat-header">
        <div class="tech-cat-dot dot-${cc}"></div>
        <div class="tech-cat-name">${cat}</div>
      </div>
    `;

// ── RENDER COLLABORATIONS ─────────────────────────────────
function renderCollaborations(collabs) {
  const panel = document.getElementById('collaborations');
  panel.innerHTML = '<div class="section-title">Cross-Functional Partnerships</div>';

  // ── Environment filter pills (In-house / Law Firm) ──
  const envFilter = document.createElement('div');
  envFilter.className = 'collab-env-filter';
  ['All', 'In-house', 'Law Firm'].forEach(env => {
    const pill = document.createElement('button');
    pill.className = 'env-pill' + (env === 'All' ? ' active' : '');
    pill.textContent = env;
    pill.dataset.env = env;
    envFilter.appendChild(pill);
  });
  panel.appendChild(envFilter);

  // ── Two accordion groups: Internal / External ──
  const typeColors = { 'Internal': '#2563eb', 'External': '#c2620a' };
  const groups = { 'Internal': [], 'External': [] };
  collabs.forEach(c => {
    const pt = f(c, 'Partner Type') || 'Internal';
    if (groups[pt]) groups[pt].push(c);
  });

  const allCards = [];

  ['Internal', 'External'].forEach((type, idx) => {
    const items = groups[type];
    if (!items.length) return;

    const group = document.createElement('div');
    group.className = 'collab-group' + (idx === 0 ? ' open' : '');

    const hdr = document.createElement('div');
    hdr.className = 'collab-group-header';
    hdr.innerHTML = `
      <div class="collab-type-dot" style="background:${typeColors[type]};width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:2px;"></div>
      <div class="collab-group-label">${type} Partners</div>
      <div class="collab-group-count">${items.length} teams</div>
      <div class="collab-group-toggle">▾</div>
    `;
    hdr.addEventListener('click', () => group.classList.toggle('open'));
    group.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'collab-group-body';

    const grid = document.createElement('div');
    grid.className = 'collab-grid';
    grid.style.paddingTop = '4px';

    items.forEach(c => {
      const card = document.createElement('div');
      card.className = 'collab-card';
      card.dataset.env = f(c, 'Environment') || '';

      const dot = document.createElement('div');
      dot.className = 'collab-type-dot';
      dot.style.background = typeColors[type] || '#92784a';
      card.appendChild(dot);

      const bd = document.createElement('div');
      bd.style.flex = '1';
      const where = f(c,'Where');
      bd.innerHTML = `
        <div class="collab-name">${f(c,'Partner Team')}</div>
        ${f(c,'Representative Collaboration') ? `<div class="collab-rep">${f(c,'Representative Collaboration')}</div>` : ''}
        ${where ? `<div class="collab-where">${where}</div>` : ''}
      `;
      card.appendChild(bd);
      grid.appendChild(card);
      allCards.push(card);
    });

    body.appendChild(grid);
    group.appendChild(body);
    panel.appendChild(group);
  });

  // ── Pill click: highlight matching, dim others ──
  let activeEnv = 'All';
  envFilter.addEventListener('click', e => {
    const pill = e.target.closest('.env-pill');
    if (!pill) return;
    activeEnv = pill.dataset.env;
    envFilter.querySelectorAll('.env-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');

    allCards.forEach(card => {
      card.classList.remove('highlighted','dimmed');
      if (activeEnv === 'All') return;
      if (card.dataset.env === activeEnv) {
        card.classList.add('highlighted');
      } else {
        card.classList.add('dimmed');
      }
    });

    // Auto-open both groups when filtering so highlighted cards are visible
    if (activeEnv !== 'All') {
      panel.querySelectorAll('.collab-group').forEach(g => g.classList.add('open'));
    }
  });
}


// ── TAB SWITCHING ─────────────────────────────────────────
document.querySelector('.tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(btn.dataset.tab).classList.add('active');
});

// ── MAIN LOAD ─────────────────────────────────────────────
async function loadAll() {
  try {
    const [headers, employers, positions, projects, skills, technologies, collabs] = await Promise.all([
      fetchAll('Headings_Titles'),
      fetchAll('Employers'),
      fetchAll('Positions'),
      fetchAll('Projects'),
      fetchAll('Skills'),
      fetchAll('Technologies'),
      fetchAll('Collaborations'),
    ]);

    // Store globals for drill-down cross-referencing
    allProjects = projects;
    allSkills   = skills;

    renderHeader(headers);
    renderExperience(employers, positions);
    renderProjects(projects);
    renderSkills(skills);
    renderTechnologies(technologies);
    renderCollaborations(collabs);

  } catch (err) {
    console.error(err);
    document.getElementById('experience').innerHTML = `
      <div class="error-msg">
        <strong>Error loading data:</strong> ${err.message}<br>
        <small>Check that your API token has read access to all tables.</small>
      </div>`;
  } finally {
    const loader = document.getElementById('loader');
    loader.classList.add('hidden');
    setTimeout(() => {
      loader.style.display = 'none';
      document.getElementById('app').classList.add('visible');
    }, 500);
  }
}

loadAll();
